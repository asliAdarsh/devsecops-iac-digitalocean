name: "FinTrack Workload GitOps Pipeline"

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'Workload/Spokes/fintrack/**'
      - 'Workload/Core/**'
      - 'Modules/**'
      - 'Deployment/**'
      - '.github/workflows/**'
  push:
    branches: [ main ]
    paths:
      - 'Workload/Spokes/fintrack/**'
      - 'Workload/Core/**'
      - 'Modules/**'
      - 'Deployment/**'
      - '.github/workflows/**'

jobs:
  # ==========================================
  # PHASE 1: CORE HUB PLATFORM VALIDATION
  # ==========================================
  plan-core-network:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/terraform-plan.yml
    with:
      working_directory: 'Workload/Core/network'
      tfvars_file: '../../../../Deployment/Core/global.tfvars'
      state_key: 'core/network.tfstate'
      artifact_name: 'core-network-tfplan'
    secrets: inherit

  # ==========================================
  # PHASE 2: SPOKE APPLICATION VALIDATION
  # ==========================================
  plan-network:
    if: github.event_name == 'pull_request'
    needs: plan-core-network # ◄── CRITICAL: Validates Hub syntax structure first!
    uses: ./.github/workflows/terraform-plan.yml
    with:
      working_directory: 'Workload/Spokes/fintrack/network'
      tfvars_file: '../../../../Deployment/Spokes/fintrack/dev.tfvars'
      state_key: 'spokes/fintrack/network.tfstate'
      artifact_name: 'fintrack-network-tfplan'
    secrets: inherit

  plan-data:
    if: github.event_name == 'pull_request'
    needs: plan-network
    uses: ./.github/workflows/terraform-plan.yml
    with:
      working_directory: 'Workload/Spokes/fintrack/data'
      tfvars_file: '../../../../Deployment/Spokes/fintrack/dev.tfvars'
      state_key: 'spokes/fintrack/data.tfstate'
      artifact_name: 'fintrack-data-tfplan'
    secrets: inherit

  plan-identity:
    if: github.event_name == 'pull_request'
    needs: plan-data
    uses: ./.github/workflows/terraform-plan.yml
    with:
      working_directory: 'Workload/Spokes/fintrack/identity'
      tfvars_file: '../../../../Deployment/Spokes/fintrack/dev.tfvars'
      state_key: 'spokes/fintrack/identity.tfstate'
      artifact_name: 'fintrack-identity-tfplan'
    secrets: inherit

  # ==========================================
  # PHASE 3: PRODUCTION DEPLOYMENTS (CD)
  # ==========================================
  apply-core-network:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/terraform-apply.yml
    with:
      working_directory: 'Workload/Core/network'
      state_key: 'core/network.tfstate'
      artifact_name: 'core-network-tfplan'
    secrets: inherit

  apply-network:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: apply-core-network # ◄── CRITICAL: Core networks run first and output state data!
    uses: ./.github/workflows/terraform-apply.yml
    with:
      working_directory: 'Workload/Spokes/fintrack/network'
      state_key: 'spokes/fintrack/network.tfstate'
      artifact_name: 'fintrack-network-tfplan'
    secrets: inherit

  apply-data:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: apply-network
    uses: ./.github/workflows/terraform-apply.yml
    with:
      working_directory: 'Workload/Spokes/fintrack/data'
      state_key: 'spokes/fintrack/data.tfstate'
      artifact_name: 'fintrack-data-tfplan'
    secrets: inherit

  apply-identity:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: apply-data
    uses: ./.github/workflows/terraform-apply.yml
    with:
      working_directory: 'Workload/Spokes/fintrack/identity'
      state_key: 'spokes/fintrack/identity.tfstate'
      artifact_name: 'fintrack-identity-tfplan'
    secrets: inherit